[pytest]
# Pytest configuration for login tests

# Disable all warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::sqlalchemy.exc.SAWarning

# Test paths
testpaths = tests

# Console output options
console_output_style = progress

# Verbosity
addopts = 
    --tb=short
    --strict-markers
    -p no:warnings
